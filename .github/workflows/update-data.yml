name: Update AIPulse data

on:
  schedule:
    # 每天两次：UTC 00:00 与 12:00 = 越南/北京时间约 07:00 与 19:00（早晚各刷一次）
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # 也可在 Actions 页面手动触发

permissions:
  contents: write          # 允许工作流把 data.json 推回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 提高 GitHub API 限额
        run: node scripts/fetch-data.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --quiet --staged; then
            echo "No changes."
          else
            git commit -m "chore: daily AIPulse data update [skip ci]"
            git push
          fi
